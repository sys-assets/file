  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #b22222; 
      font-family: Arial, sans-serif;
      color: #fff;
      text-align: center;
    }

    .center-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      opacity: 0;
      animation: fadeIn 1.2s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-icon {
      width: 100px;
      height: 100px;
      border-radius: 20px;
      margin-bottom: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    .logo-icon img {
      max-width: 100%;
      max-height: 100%;
    }

    .spinner {
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top: 3px solid #ffffff;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      margin: 20px 0;
      animation: spin 0.8s ease-in-out infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    h2 {
      margin: 10px 0 5px;
      font-weight: normal;
    }

    p {
      font-size: 14px;
      opacity: 0.9;
    }
  </style>
